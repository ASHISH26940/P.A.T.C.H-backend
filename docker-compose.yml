services:
  db:
    image: pgvector/pgvector:pg17
    container_name: patch_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-patched}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-patched}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - patch_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: patch-backend:latest
    container_name: patch_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - patch_network
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://user:password@db:5432/patched}
      POSTGRES_DB: ${POSTGRES_DB:-patched}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-change_this_in_production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:

networks:
  patch_network:
    driver: bridge
