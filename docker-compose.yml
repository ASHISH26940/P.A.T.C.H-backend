services:
  db:
    image: pgvector/pgvector:pg17
    container_name: patch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-patched}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-patched}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - patch_network

  backend:
    build: .
    image: patch-backend:latest
    container_name: patch_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-patched}
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:5000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - patch_network

volumes:
  postgres_data:

networks:
  patch_network:
    driver: bridge
