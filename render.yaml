databases:
  - name: patch-postgres
    databaseName: patched
    plan: free
    region: oregon
    postgresMajorVersion: 16

services:
  - type: web
    name: patch-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: patch-postgres
          property: connectionString
      - key: POSTGRES_DB
        value: patched
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: ENVIRONMENT
        value: production
