services:
  # PostgreSQL Database with pgvector
  - type: pserv
    name: patch-postgres
    plan: free
    region: oregon

  # FastAPI Backend Application
  - type: web
    name: patch-backend
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    healthCheckPath: /v1/health
    envVars:
      # Database Configuration
      - key: DATABASE_URL
        fromDatabase:
          name: patch-postgres
          property: connectionString
      - key: POSTGRES_DB
        fromDatabase:
          name: patch-postgres
          property: database

      # Security - IMPORTANT: Set GEMINI_API_KEY in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"

      # Application Environment
      - key: ENVIRONMENT
        value: production
